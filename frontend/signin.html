<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – SkillScape</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="auth-page" data-auth="signin">
  <main class="auth-card">
    <div class="auth-hero">
      <div class="auth-icon auth-icon-signin">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a9 9 0 0 0-9 9c0 3.86 2.64 7.11 6.25 8.18V22h5.5v-3.82A8.96 8.96 0 0 0 21 10a9 9 0 0 0-9-9zm0 2a7 7 0 0 1 7 7c0 2.78-1.58 5.18-3.92 6.26L15 18H9l1.92-1.74A7.005 7.005 0 0 1 5 10a7 7 0 0 1 7-7z" fill="currentColor"/>
          <path d="M11 11V7h2v4h3l-4 4-4-4h3z" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>Welcome back</h1>
        <p>Sign in to continue your SkillScape journey and resume your training.</p>
      </div>
    </div>

    <div class="auth-spotlight">
      <div class="spotlight-item">
        <div class="spotlight-icon spotlight-icon-blue">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p>Jump back to your latest training in one click.</p>
      </div>
      <div class="spotlight-item">
        <div class="spotlight-icon spotlight-icon-purple">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p>Save your progress automatically across sessions.</p>
      </div>
      <div class="spotlight-item">
        <div class="spotlight-icon spotlight-icon-green">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p>Keep learning with tailored content that adapts to you.</p>
      </div>
    </div>

    <div id="status-message" class="status-message" style="display:none;"></div>

    <form id="auth-form" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
    </form>

    <div class="social-auth">
      <p>Or continue with</p>
      <div class="social-buttons">
        <button type="button" class="social-btn social-google">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" fill="#EA4335"/>
            <path d="M14.5 9.5a2.5 2.5 0 0 0-4.5 1.5v2h4v-1.2h-2.2v-.6c0-.6.4-1.2 1-1.2h1.2V9.5Z" fill="white"/>
          </svg>
          Google
        </button>
        <button type="button" class="social-btn social-microsoft">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="7" height="7" fill="#F35325"/>
            <rect x="13" y="4" width="7" height="7" fill="#81BC06"/>
            <rect x="4" y="13" width="7" height="7" fill="#05A6F0"/>
            <rect x="13" y="13" width="7" height="7" fill="#FFBA08"/>
          </svg>
          Microsoft
        </button>
      </div>
    </div>

    <div class="auth-footer">
      <span>New to SkillScape?</span>
      <a href="signup.html">Sign Up</a>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
