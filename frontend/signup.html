<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – SkillScape</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="auth-page" data-auth="signup">
  <main class="auth-card">
    <h1>Create your SkillScape account</h1>
    <p>Sign up now to access immersive skill training and save your progress.</p>

    <div id="status-message" class="status-message" style="display:none;"></div>

    <form id="auth-form" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required />
      </div>

      <div class="form-group">
        <label for="role">I am a</label>
        <select id="role" name="role" required>
          <option value="learner">Learner</option>
          <option value="admin">Administrator</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary auth-submit">Sign Up</button>
    </form>

    <div class="auth-footer">
      <span>Already have an account?</span>
      <a href="signin.html">Sign In</a>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
