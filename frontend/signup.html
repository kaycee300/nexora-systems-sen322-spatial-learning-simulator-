<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – SkillScape</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body class="auth-page" data-auth="signup">
  <main class="auth-card">
    <h1>Create your SkillScape account</h1>
    <p>Sign up now to access immersive skill training and save your progress.</p>
      <div class="auth-hero">
        <div class="auth-icon auth-icon-signup">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 14c1.66 0 2.99-1.34 2.99-3S16.66 8 15 8s-3 1.34-3 3 1.34 3 3 3zm-6 0c1.66 0 2.99-1.34 2.99-3S10.66 8 9 8 6 9.34 6 11s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V21h14v-1.5C13 17.17 8.33 16 6 16zm9 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V21h6v-1.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>Create your SkillScape account</h1>
          <p>Sign up now to access immersive skill training and save your progress.</p>
        </div>
      </div>

    <div id="status-message" class="status-message" style="display:none;"></div>

    <form id="auth-form" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required />
      </div>

      <div class="form-group">
        <label for="role">I am a</label>
        <select id="role" name="role" required>
          <option value="learner">Learner</option>
          <option value="admin">Administrator</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary auth-submit">Sign Up</button>
    </form>

    <div class="auth-footer">
      <span>Already have an account?</span>
      <a href="signin.html">Sign In</a>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
